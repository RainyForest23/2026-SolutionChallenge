services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ai-pipeline:/app/ai-pipeline
    env_file:
      - ./backend/.env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Celery worker (비동기 AI 파이프라인 처리)
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - ./ai-pipeline:/app/ai-pipeline
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - backend
