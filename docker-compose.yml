services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./ai-pipeline:/app/ai-pipeline
      - ./secret:/app/secret
    env_file:
      - ./backend/.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/secret/serviceAccountKey.json 
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Celery worker (비동기 AI 파이프라인 처리)
  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - ./ai-pipeline:/app/ai-pipeline
      - ./secret:/app/secret
    env_file:
      - ./backend/.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/secret/serviceAccountKey.json  
    depends_on:
      - redis
      - backend
